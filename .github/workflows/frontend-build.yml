name: Frontend Build & Test

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App to build'
        required: true
        type: choice
        options:
          - website
          - hr-portal
          - applicant-portal
          - admin-portal
          - all
      version:
        description: 'Build version (e.g., 1.0.0)'
        required: true
        type: string
  push:
    branches: [ main, develop ]
    paths:
      - 'airral-frontend/**'
      - '.github/workflows/frontend-build.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'airral-frontend/**'

defaults:
  run:
    working-directory: airral-frontend

jobs:
  lint-libraries:
    name: Lint Libraries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: airral-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint shared libraries
        run: npx nx run-many --target=lint --projects=shared-utils,shared-types,shared-api,shared-auth,shared-ui

  build-single:
    name: Build ${{ inputs.app }} v${{ inputs.version }}
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.app != 'all'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: airral-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint ${{ inputs.app }}
        run: npx nx lint ${{ inputs.app }}

      - name: Build ${{ inputs.app }}
        run: npx nx build ${{ inputs.app }} --configuration=production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app }}-dist-${{ inputs.version }}
          path: airral-frontend/dist/apps/${{ inputs.app }}
          retention-days: 7

  build-all:
    name: Build All Apps
    runs-on: ubuntu-latest
    # Only run on push/PR (not workflow_dispatch unless app=all)
    if: github.event_name != 'workflow_dispatch' || inputs.app == 'all'

    strategy:
      fail-fast: false
      matrix:
        app: [website, hr-portal, applicant-portal, admin-portal]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: airral-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint ${{ matrix.app }}
        run: npx nx lint ${{ matrix.app }}

      - name: Build ${{ matrix.app }}
        run: npx nx build ${{ matrix.app }} --configuration=production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-dist
          path: airral-frontend/dist/apps/${{ matrix.app }}
          retention-days: 7
