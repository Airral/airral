name: Frontend Build & Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'airral-frontend/**'
      - '.github/workflows/frontend-*.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'airral-frontend/**'

defaults:
  run:
    working-directory: airral-frontend

jobs:
  build:
    name: Build All Apps
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: [website, hr-portal, applicant-portal, admin-portal]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'npm'
          cache-dependency-path: airral-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint ${{ matrix.app }}
        run: npx nx lint ${{ matrix.app }}

      - name: Build ${{ matrix.app }}
        run: npx nx build ${{ matrix.app }} --configuration=production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-dist
          path: airral-frontend/dist/apps/${{ matrix.app }}
          retention-days: 7

  test:
    name: Lint Libraries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'npm'
          cache-dependency-path: airral-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint shared libraries
        run: npx nx run-many --target=lint --projects=shared-utils,shared-types,shared-api,shared-auth,shared-ui
