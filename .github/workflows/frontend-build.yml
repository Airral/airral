name: Frontend Build & Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'airral-frontend/**'
      - '.github/workflows/frontend-*.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'airral-frontend/**'

defaults:
  run:
    working-directory: airral-frontend

jobs:
  build:
    name: Build All Apps
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: [website, hr-portal, applicant-portal, admin-portal]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: airral-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint ${{ matrix.app }}
        run: npx nx lint ${{ matrix.app }}

      - name: Build ${{ matrix.app }}
        run: npx nx build ${{ matrix.app }} --configuration=production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-dist
          path: airral-frontend/dist/apps/${{ matrix.app }}
          retention-days: 7

  test:
    name: Test Libraries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: airral-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test shared-utils
        run: npx nx test shared-utils --coverage

      - name: Test shared-types
        run: npx nx test shared-types --coverage

      - name: Test shared-api
        run: npx nx test shared-api --coverage

      - name: Test shared-auth
        run: npx nx test shared-auth --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: airral-frontend/coverage/**/lcov.info
          flags: frontend
          name: frontend-coverage

  build-check:
    name: Production Build Verification
    runs-on: ubuntu-latest
    needs: [build, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: airral-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build all apps in production mode
        run: |
          npx nx run-many --target=build --all --configuration=production --parallel=4

      - name: Check bundle sizes
        run: |
          echo "## Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          for app in website hr-portal applicant-portal admin-portal; do
            size=$(du -sh dist/apps/$app | cut -f1)
            echo "- **$app**: $size" >> $GITHUB_STEP_SUMMARY
          done
