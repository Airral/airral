name: Backend Build & Test

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Build version (e.g., 1.0.0)'
        required: true
        type: string
  push:
    branches: [ main, develop ]
    paths:
      - 'airral-backend/**'
      - '.github/workflows/backend-build.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'airral-backend/**'

defaults:
  run:
    working-directory: airral-backend

jobs:
  build:
    name: Build & Test v${{ inputs.version || 'auto' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # This action downloads Gradle automatically — no gradle-wrapper.jar needed in repo
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Build with Gradle
        run: gradle clean build -x test

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: airral-backend/build/libs/*.jar
          retention-days: 7
