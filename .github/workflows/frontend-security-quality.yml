name: Frontend Security & Quality

on:
  schedule:
    - cron: '0 3 * * 1' # Weekly on Monday at 3 AM
  push:
    branches: [ main ]
    paths:
      - 'airral-frontend/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: airral-frontend

jobs:
  dependency-audit:
    name: NPM Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: airral-frontend/package-lock.json

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run npm audit fix
        run: npm audit fix --dry-run

  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=airral-frontend/package.json

  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: [website, hr-portal]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: airral-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.app }}
        run: npx nx build ${{ matrix.app }} --configuration=production

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            http://localhost:4200
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: './airral-frontend/lighthouserc.json'

  bundle-analysis:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: airral-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Analyze bundle sizes
        run: |
          npx nx run-many --target=build --all --configuration=production --parallel=4

          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          for app in website hr-portal applicant-portal admin-portal; do
            size=$(du -sh dist/apps/$app | cut -f1)
            files=$(find dist/apps/$app -type f | wc -l)
            echo "### $app" >> $GITHUB_STEP_SUMMARY
            echo "- **Total Size**: $size" >> $GITHUB_STEP_SUMMARY
            echo "- **Files**: $files" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done
