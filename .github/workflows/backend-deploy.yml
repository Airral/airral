name: Backend Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version to deploy (e.g., 1.0.0)'
        required: true
        type: string

defaults:
  run:
    working-directory: airral-backend

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      # Gradle is now on PATH thanks to the action above
      - name: Build production JAR
        run: gradle clean build -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name airral-backend \
            --version-label ${{ inputs.version }}-${{ github.sha }} \
            --source-bundle S3Bucket="airral-deployments",S3Key="backend/${{ inputs.version }}.jar"
          
          aws elasticbeanstalk update-environment \
            --environment-name airral-backend-${{ inputs.environment }} \
            --version-label ${{ inputs.version }}-${{ github.sha }}

      - name: Wait for deployment
        run: |
          aws elasticbeanstalk wait environment-updated \
            --environment-name airral-backend-${{ inputs.environment }}

      - name: Verify deployment
        run: |
          HEALTH_URL="https://api-${{ inputs.environment }}.airral.com/actuator/health"
          for i in {1..30}; do
            if curl -f $HEALTH_URL; then
              echo "Deployment successful!"
              exit 0
            fi
            echo "Waiting for service to be healthy... ($i/30)"
            sleep 10
          done
          echo "Deployment verification failed"
          exit 1

      - name: Notify deployment
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Backend deployment to ${{ inputs.environment }}: ${{ job.status }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
