name: Backend Release

on:
  push:
    tags:
      - 'backend-v*.*.*'

defaults:
  run:
    working-directory: airral-backend

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/backend-v}" >> $GITHUB_OUTPUT

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build production JAR
        run: ./gradlew clean build -x test
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Backend v${{ steps.version.outputs.VERSION }}
          body: |
            ## Airral Backend Release v${{ steps.version.outputs.VERSION }}
            
            ### Changes
            See [CHANGELOG.md](CHANGELOG.md) for details.
            
            ### Deployment
            ```bash
            java -jar airral-backend-${{ steps.version.outputs.VERSION }}.jar
            ```
            
            ### Environment Variables Required
            - `SPRING_R2DBC_URL`
            - `SPRING_R2DBC_USERNAME`
            - `SPRING_R2DBC_PASSWORD`
            - `JWT_SECRET`
            - `CORS_ALLOWED_ORIGINS`
          files: |
            airral-backend/build/libs/*.jar
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: ${{ !contains(steps.version.outputs.VERSION, 'beta') && !contains(steps.version.outputs.VERSION, 'alpha') }}
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker build -t airral/backend:${{ steps.version.outputs.VERSION }} -t airral/backend:latest .
          docker push airral/backend:${{ steps.version.outputs.VERSION }}
          docker push airral/backend:latest
