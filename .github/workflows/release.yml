name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App to deploy'
        required: true
        type: choice
        options:
          - backend
          - website
          - hr-portal
          - applicant-portal
          - admin-portal
      tag:
        description: 'Image tag to deploy (for example, v1.0.0)'
        required: true
        type: string

env:
  GCP_REGION: us-central1
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_ARTIFACT_REGISTRY: ${{ secrets.GCP_ARTIFACT_REGISTRY }}

jobs:
  deploy:
    name: "Deploy ${{ inputs.app }}:${{ inputs.tag }}"
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy image to Cloud Run
        id: deploy
        env:
          CLOUD_RUN_PORT: ${{ inputs.app == 'backend' && '8080' || '80' }}
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: airral-${{ inputs.app }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_ARTIFACT_REGISTRY }}/airral-${{ inputs.app }}:${{ inputs.tag }}
          region: ${{ env.GCP_REGION }}
          flags: '--allow-unauthenticated --port=${{ env.CLOUD_RUN_PORT }}'

      - name: Show Cloud Run URL
        run: |
          echo "Deployment complete! URL: ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify deployment
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Deployed ${{ inputs.app }} tag ${{ inputs.tag }} to Cloud Run.'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
