<airral-header [links]="headerLinks" [ctas]="headerCtas"></airral-header>

<main class="auth-page">
  <section class="auth-hero">
    <h1>Job Seeker Sign In</h1>
    <p>Access your applications, track interviews, and manage your job search.</p>
  </section>

  <section class="auth-card-wrap">
    <form class="auth-card" (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <h2>Welcome back</h2>

      <label for="email">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        required
        [(ngModel)]="email"
        placeholder="you@example.com"
      />

      <label for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        required
        [(ngModel)]="password"
        placeholder="Enter your password"
      />

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" class="btn-primary" [disabled]="isLoading || !loginForm.form.valid">
        {{ isLoading ? 'Signing in...' : 'Sign in' }}
      </button>

      <p class="alt-action">
        New here?
        <a routerLink="/apply">Create candidate account</a>
      </p>

      <p class="alt-action" style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #e2e8f0;">
        <strong>HR / Employer?</strong><br>
        Sign in at your <a [href]="hrPortalUrl" target="_blank">HR Portal</a>
      </p>
    </form>
  </section>
</main>

<airral-footer></airral-footer>
