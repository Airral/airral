<main class="hr-login-page">
  <!-- Left Side: Clean Brand Showcase -->
  <section class="brand-section">
    <div class="brand-content">
      <div class="logo-box">
        <span>A</span>
      </div>
      <h1>Airral Hiring OS</h1>
      <p>The modern, all-in-one platform to find, interview, and hire the best talent.</p>
    </div>

    <!-- Decorative graphic abstracting recruiting -->
    <div class="brand-graphic">
      <div class="glass-card g-1"></div>
      <div class="glass-card g-2"></div>
      <div class="glass-card g-3"></div>
    </div>
  </section>

  <!-- Right Side: Minimal Login Card -->
  <section class="login-section">
    <div class="login-container">

      <div class="login-header">
        <h2>Welcome Back</h2>
        <p>Sign in to access your HR workspace</p>
      </div>

      <form class="login-form" (ngSubmit)="onSubmit()" #loginForm="ngForm">

        <div class="input-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input
              id="email"
              name="email"
              type="email"
              required
              [(ngModel)]="email"
              placeholder="hr@company.com"
            />
          </div>
        </div>

        <div class="input-group">
          <div class="label-row">
            <label for="password">Password</label>
            <a href="#" class="forgot-link">Forgot?</a>
          </div>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              id="password"
              name="password"
              type="password"
              required
              [(ngModel)]="password"
              placeholder="Enter your password"
            />
          </div>
        </div>

        <p class="error-msg" *ngIf="errorMessage">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ errorMessage }}
        </p>

        <button type="submit" class="btn-login" [disabled]="isLoading || !loginForm.form.valid">
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading" class="loading">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
            </svg>
            Signing in...
          </span>
        </button>

        <div class="divider">
          <span>or</span>
        </div>

        <a [href]="portalRoutes.WEBSITE + '/login'" class="btn-outline">
          Apply for a Job (Applicant Portal)
        </a>
      </form>

    </div>
  </section>
</main>
