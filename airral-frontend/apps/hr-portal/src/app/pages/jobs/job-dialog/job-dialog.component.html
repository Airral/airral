<div class="modal-overlay" *ngIf="visible" (click)="onOverlayClick()">
  <div class="modal-dialog" (click)="onDialogClick($event)">
    <header class="modal-header">
      <div class="title-section">
        <div class="icon-badge">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <path d="M3 9h18M9 21V9" />
          </svg>
        </div>
        <h2>{{ editMode ? 'Edit Requisition' : 'New Requisition' }}</h2>
      </div>
      <button type="button" class="close-btn" (click)="onCancel()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12" />
        </svg>
      </button>
    </header>

    <div class="modal-body">
      <div class="modal-grid">
        <label>
          <span class="label-text">Job Title <span class="required">*</span></span>
          <input [(ngModel)]="formData.title" placeholder="e.g., Senior Backend Engineer" />
        </label>
        <label>
          <span class="label-text">Department <span class="required">*</span></span>
          <input [(ngModel)]="formData.department" placeholder="e.g., Engineering" />
        </label>
        <label>
          <span class="label-text">Location</span>
          <input [(ngModel)]="formData.location" placeholder="e.g., San Francisco, CA (Remote)" />
        </label>
        <label>
          <span class="label-text">Employment Type</span>
          <select [(ngModel)]="formData.employmentType">
            <option value="Full-time">Full-time</option>
            <option value="Part-time">Part-time</option>
            <option value="Contract">Contract</option>
            <option value="Internship">Internship</option>
          </select>
        </label>
        <label>
          <span class="label-text">Salary Min ($)</span>
          <input type="number" [(ngModel)]="formData.salaryMin" placeholder="80,000" />
        </label>
        <label>
          <span class="label-text">Salary Max ($)</span>
          <input type="number" [(ngModel)]="formData.salaryMax" placeholder="120,000" />
        </label>
      </div>

      <label class="full-width">
        <span class="label-text">Job Description <span class="required">*</span></span>
        <textarea
          [(ngModel)]="formData.description"
          rows="4"
          placeholder="Describe the role, responsibilities, and what success looks like."
        ></textarea>
      </label>

      <label class="full-width">
        <span class="label-text">Requirements</span>
        <textarea
          [(ngModel)]="formData.requirements"
          rows="3"
          placeholder="5+ years backend experience, Python/Go, microservices architecture..."
        ></textarea>
      </label>

      <label class="full-width">
        <span class="label-text">Nice-to-Have Skills</span>
        <textarea
          [(ngModel)]="formData.niceToHave"
          rows="2"
          placeholder="Experience with Kubernetes, GraphQL, React..."
        ></textarea>
      </label>

      <label class="full-width">
        <span class="label-text">
          ATS Keywords
          <span class="label-badge">AI Screening</span>
        </span>
        <input
          [(ngModel)]="formData.atsKeywords"
          placeholder="python, backend, microservices, api, postgresql"
        />
        <small class="hint">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <path d="M12 16v-4M12 8h.01" />
          </svg>
          Comma-separated keywords for automatic candidate screening
        </small>
      </label>

      <!-- LinkedIn Integration Section -->
      <div class="integration-section">
        <div class="integration-header">
          <div class="integration-icon linkedin">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
          </div>
          <div class="integration-info">
            <h4>LinkedIn Job Posting</h4>
            <p *ngIf="linkedInConnected" class="status connected">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 11-5.93-9.14" />
                <polyline points="22 4 12 14.01 9 11.01" />
              </svg>
              Connected
            </p>
            <p *ngIf="!linkedInConnected" class="status disconnected">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <line x1="4.93" y1="4.93" x2="19.07" y2="19.07" />
              </svg>
              Not Connected
            </p>
          </div>
        </div>

        <button
          type="button"
          *ngIf="!linkedInConnected"
          class="btn-linkedin"
          (click)="connectLinkedIn.emit()"
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
          Connect LinkedIn
        </button>

        <label *ngIf="linkedInConnected" class="checkbox-label">
          <input type="checkbox" [(ngModel)]="formData.linkedInEnabled" />
          <span class="checkbox-text">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 3a2.828 2.828 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z" />
            </svg>
            Post this job to LinkedIn
          </span>
        </label>
      </div>
    </div>

    <footer class="modal-footer">
      <button type="button" class="btn-secondary" (click)="onCancel()" [disabled]="saving">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12" />
        </svg>
        Cancel
      </button>
      <button type="button" class="btn-outline" (click)="onSaveDraft()" [disabled]="saving">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" />
          <polyline points="17 21 17 13 7 13 7 21" />
          <polyline points="7 3 7 8 15 8" />
        </svg>
        Save Draft
      </button>
      <button type="button" class="btn-primary" (click)="onPublish()" [disabled]="saving">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
        </svg>
        {{ editMode ? 'Update & Publish' : 'Publish Requisition' }}
      </button>
    </footer>
  </div>
</div>
