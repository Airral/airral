name: Frontend Release

on:
  push:
    tags:
      - 'frontend-v*.*.*'

defaults:
  run:
    working-directory: airral-frontend

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: airral-frontend/package-lock.json

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/frontend-v}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Build all apps for production
        run: npx nx run-many --target=build --all --configuration=production --parallel=4

      - name: Create release archives
        run: |
          cd dist/apps
          tar -czf website-${{ steps.version.outputs.VERSION }}.tar.gz website/
          tar -czf hr-portal-${{ steps.version.outputs.VERSION }}.tar.gz hr-portal/
          tar -czf applicant-portal-${{ steps.version.outputs.VERSION }}.tar.gz applicant-portal/
          tar -czf admin-portal-${{ steps.version.outputs.VERSION }}.tar.gz admin-portal/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Frontend v${{ steps.version.outputs.VERSION }}
          body: |
            ## Airral Frontend Release v${{ steps.version.outputs.VERSION }}

            ### Applications Included
            - ✅ Website (www.airral.com)
            - ✅ HR Portal (app.airral.com)
            - ✅ Applicant Portal (apply.airral.com)
            - ✅ Admin Portal (admin.airral.com)

            ### Deployment
            Extract and serve each application from a static hosting service (S3, Netlify, Vercel, etc.)

            ### Environment Configuration
            All apps automatically detect production vs development based on hostname.
            No environment variables needed for deployment.
          files: |
            airral-frontend/dist/apps/*.tar.gz
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
