name: Frontend Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - staging
          - production
      apps:
        description: 'Apps to deploy (comma-separated: website,hr-portal,applicant-portal,admin-portal or "all")'
        required: true
        type: string
        default: 'all'

defaults:
  run:
    working-directory: airral-frontend

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: airral-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Determine apps to deploy
        id: apps
        run: |
          if [ "${{ inputs.apps }}" == "all" ]; then
            echo "APPS=website,hr-portal,applicant-portal,admin-portal" >> $GITHUB_OUTPUT
          else
            echo "APPS=${{ inputs.apps }}" >> $GITHUB_OUTPUT
          fi

      - name: Build apps
        run: |
          IFS=',' read -ra APPS <<< "${{ steps.apps.outputs.APPS }}"
          for app in "${APPS[@]}"; do
            echo "Building $app..."
            npx nx build $app --configuration=production
          done

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy Website to S3
        if: contains(steps.apps.outputs.APPS, 'website')
        run: |
          aws s3 sync dist/apps/website/ s3://airral-${{ inputs.environment }}-website \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json"

          aws s3 sync dist/apps/website/ s3://airral-${{ inputs.environment }}-website \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --cache-control "public, max-age=0, must-revalidate"

          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_WEBSITE_ID }} \
            --paths "/*"

      - name: Deploy HR Portal to S3
        if: contains(steps.apps.outputs.APPS, 'hr-portal')
        run: |
          aws s3 sync dist/apps/hr-portal/ s3://airral-${{ inputs.environment }}-hr-portal \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json"

          aws s3 sync dist/apps/hr-portal/ s3://airral-${{ inputs.environment }}-hr-portal \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --cache-control "public, max-age=0, must-revalidate"

          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_HR_PORTAL_ID }} \
            --paths "/*"

      - name: Deploy Applicant Portal to S3
        if: contains(steps.apps.outputs.APPS, 'applicant-portal')
        run: |
          aws s3 sync dist/apps/applicant-portal/ s3://airral-${{ inputs.environment }}-applicant-portal \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json"

          aws s3 sync dist/apps/applicant-portal/ s3://airral-${{ inputs.environment }}-applicant-portal \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --cache-control "public, max-age=0, must-revalidate"

          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_APPLICANT_PORTAL_ID }} \
            --paths "/*"

      - name: Deploy Admin Portal to S3
        if: contains(steps.apps.outputs.APPS, 'admin-portal')
        run: |
          aws s3 sync dist/apps/admin-portal/ s3://airral-${{ inputs.environment }}-admin-portal \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json"

          aws s3 sync dist/apps/admin-portal/ s3://airral-${{ inputs.environment }}-admin-portal \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --cache-control "public, max-age=0, must-revalidate"

          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_ADMIN_PORTAL_ID }} \
            --paths "/*"

      - name: Verify deployments
        run: |
          echo "## Deployment Verification" >> $GITHUB_STEP_SUMMARY

          IFS=',' read -ra APPS <<< "${{ steps.apps.outputs.APPS }}"
          for app in "${APPS[@]}"; do
            case $app in
              website)
                url="https://www-${{ inputs.environment }}.airral.com"
                ;;
              hr-portal)
                url="https://app-${{ inputs.environment }}.airral.com"
                ;;
              applicant-portal)
                url="https://apply-${{ inputs.environment }}.airral.com"
                ;;
              admin-portal)
                url="https://admin-${{ inputs.environment }}.airral.com"
                ;;
            esac

            if curl -f -s -o /dev/null -w "%{http_code}" "$url" | grep -q "200"; then
              echo "✅ $app deployed successfully: $url" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ $app deployment verification failed: $url" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Notify deployment
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Frontend deployment (${{ inputs.apps }}) to ${{ inputs.environment }}: ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
