spring:
  application:
    name: airral-backend
  
  # R2DBC Database Configuration (Reactive)
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/airral_db
    username: ${DB_USER:HXS0302}
    password: ${DB_PASSWORD:}
    pool:
      initial-size: 10
      max-size: 20
      max-idle-time: 30m
  
  # Flyway Configuration (blocking, runs on startup)
  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/airral_db
    user: ${DB_USER:HXS0302}
    password: ${DB_PASSWORD:}
    locations: classpath:db/migration
    baseline-on-migrate: true
  
  # Mail Configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Server Configuration
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:mySuperLongDefaultJwtSecretKeyForDevelopmentOnly_ChangeMe_0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ}
  expiration: 86400000  # 24 hours in milliseconds

# CORS Configuration
# Development: localhost with different ports
# Production: airral.com subdomains
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:4201,http://localhost:4202,http://localhost:4203,https://www.airral.com,https://app.airral.com,https://apply.airral.com,https://admin.airral.com}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# File Upload Configuration
file:
  upload:
    max-size: 5MB
    allowed-types: application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document
    storage-path: ${FILE_STORAGE_PATH:./uploads}

# ATS Configuration
ats:
  default-min-score: 70
  tiers:
    quick-hire:
      algorithm: SIMPLE
    professional:
      algorithm: WEIGHTED
    enterprise:
      algorithm: AI_ENHANCED

# Logging
logging:
  level:
    root: INFO
    com.airral: DEBUG
    org.springframework.security: DEBUG
    io.r2dbc.postgresql.QUERY: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
